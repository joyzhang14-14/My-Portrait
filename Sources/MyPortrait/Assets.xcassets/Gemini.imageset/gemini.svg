<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Gemini 4-point sparkle:concave sides + Google 四色,顺时针
       top=red, right=blue, bottom=green, left=yellow。每个象限独立
       上色;在尖角处接缝就是品牌色,中部混色靠 SwiftUI 的抗锯齿过渡。 -->
  <!-- NE 象限(top→right):红 -->
  <path fill="#EA4335" d="M12 12 L12 0 Q14 10 24 12 Z"/>
  <!-- SE 象限(right→bottom):蓝 -->
  <path fill="#4285F4" d="M12 12 L24 12 Q14 14 12 24 Z"/>
  <!-- SW 象限(bottom→left):绿 -->
  <path fill="#34A853" d="M12 12 L12 24 Q10 14 0 12 Z"/>
  <!-- NW 象限(left→top):黄 -->
  <path fill="#FBBC04" d="M12 12 L0 12 Q10 10 12 0 Z"/>
</svg>
