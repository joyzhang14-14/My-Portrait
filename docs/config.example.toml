# My Portrait — example configuration.
#
# The live config lives at ~/.myportrait/config.toml and is written by the
# app on every change. This file documents every field with its default
# value. Copy it over, or hand-edit the live file directly — the app
# hot-reloads on save.
schema_version = 1

[ai_models]
presets = []

[chat]
redact_pii = false

[display]
app_name = 'My Portrait'
chat_always_on_top = false
custom_dock_icon = ''
custom_tray_icon = ''
hide_model_reasoning = false
show_in_menu_bar = true
show_overlay_in_recording = true
theme = 'system'
translucent_sidebar = true

[general]
auto_download_updates = true
launch_at_login = false
update_check_minutes = 60

[memory]
alpha = 0.3
archive_max_impact = 2.0
archive_max_weight = 0.05
archive_min_days_idle = 90
index_interval_minutes = 15
indexer_enabled = true
max_rebalances = 5
min_weight = 0.0
peak_protection = 4.5
weekly_budget = 50.0
window_days = 7

[notifications]
app_updates = true
capture_stalls = false
muted_pipes = []
pipe_alerts = true

[privacy]
capture_clipboard = false
ignore_incognito = true
# Default blacklist: password managers / sensitive tools. Exact app-name
# match (case-insensitive). A frame is skipped when the focused app matches.
ignored_apps = ['1Password', 'Bitwarden', 'KeePassXC', 'Keychain Access', 'Authy']
# URL glob patterns (NSPredicate LIKE[c]). e.g. '*.bank.com/*', '*mail*'.
ignored_urls = []
# Reserved — not enforced yet. IgnoreGate has no allowlist logic.
included_apps = []
pii_removal = true
record_audio_while_locked = false

[recording.audio]
auto_select_audio_devices = true
batch_transcription = true
capture_system_audio = false
custom_vocabulary = []
deepgram_api_key_ref = ''
enabled = true
engine = 'whisper'
filter_music = false
languages = []
microphones_selected = []
speaker_id_enabled = true
use_core_audio_capture = true
user_name = ''

[recording.screen]
enabled = true
frame_interval_ms = 1000
ocr_engine = 'tesseract'
quality = 'medium'
video_format = 'h264'
video_fps = 1

[recording.system]
chinese_mirror = false
power_mode = 'auto'

[storage]
auto_delete_mode = 'mediaOnly'
data_directory = ''
retention_days = 'd30'

[usage]
range = 'last7d'
