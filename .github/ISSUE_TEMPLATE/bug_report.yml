name: Bug report
description: Report a crash or bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please describe what went wrong and, if you can, how to
        reproduce it.

        If you'd rather send detailed logs privately instead of writing it up, use
        **My Portrait → Settings → Health → "Send data to developer privately"**.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and — if you can — how to reproduce it.
      placeholder: "e.g. The app crashed when I quickly toggled Audio Capture on and off."
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version
      description: Settings → General → Current version.
      placeholder: "e.g. 1.2.85"
    validations:
      required: false
