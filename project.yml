# XcodeGen 声明 —— `xcodegen generate` 从这个文件吐出 MyPortrait.xcodeproj。
#
# 为什么用它：SwiftPM executable target 构建出的是裸 binary，TCC 按 cdhash 匹配，
# 每次 rebuild 权限失效。正经 macOS App target 出签名 .app bundle，TCC 按
# designated requirement（bundle id + 证书）匹配，跨 rebuild 稳定。
#
# 改配置就改这个 yml + 重跑 `xcodegen generate`。源码一行不用动。
# Package.swift 保留 —— `swift build` / CI 仍可用，两套构建并存。
name: MyPortrait

options:
  bundleIdPrefix: com.joyzhang
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

# 工程级:所有配置只编当前机器架构。Release 默认编 universal 双架构,
# 而 SwiftPM 依赖包(Qwen3Speech 等)不继承 target 级 ARCHS=arm64,
# x86_64 切片会因 Float16 不可用整包编译失败(app 已放弃 Intel,见
# target settings 的 ARCHS 注释;Debug 默认本就 YES,行为不变)。
settings:
  base:
    ONLY_ACTIVE_ARCH: YES

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 7.10.0
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: 0.14.1
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift.git
    from: 0.21.3
  qwen3-asr-swift:
    url: https://github.com/ivan-digital/qwen3-asr-swift.git
    exactVersion: 0.0.19
  TOMLKit:
    url: https://github.com/LebJe/TOMLKit.git
    from: 0.6.0
  onnxruntime:
    url: https://github.com/microsoft/onnxruntime-swift-package-manager
    from: 1.24.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

targets:
  # ── 图谱物理热路径(GraphPhysicsEngine + GraphModel + GraphConstants)──
  # 拆独立静态库的唯一理由:**Debug 也开 -O**。app target 的 Debug 是
  # -Onone,物理单 tick 慢 35 倍(7ms vs 0.2ms)、影子引擎 1.6~2.5s,
  # 开局/松手肉眼可见延迟(07-08 用户拍板拆模块)。代价:物理模块内
  # 断点/逐行调试不可用(优化后变量被折叠),要调试物理临时把
  # SWIFT_OPTIMIZATION_LEVEL 改回 -Onone 重新 xcodegen。
  GraphPhysics:
    type: library.static
    platform: macOS
    sources:
      - Sources/GraphPhysics
    settings:
      base:
        SWIFT_VERSION: "6.0"
        ARCHS: arm64
        SWIFT_OPTIMIZATION_LEVEL: "-O"
        SWIFT_COMPILATION_MODE: wholemodule
        # -O 与 -enable-testing 混用会告警;物理模块不需要 @testable
        ENABLE_TESTABILITY: "NO"

  MyPortrait:
    type: application
    platform: macOS
    sources:
      - path: Sources/MyPortrait
        excludes:
          - "**/README.md"
      # ObjC try/catch helper —— 直接挂到 app target,不当独立 framework /
      # static lib(framework 要 Info.plist + 签名,static lib modulemap
      # 跟 Xcode auto-modulemap 打架)。Swift 通过 bridging header 看到。
      - path: Sources/MyPortraitObjC
      # PortraitSleepHelper 的 daemon plist —— 原样拷进
      # .app/Contents/Library/LaunchDaemons/(SMAppService 要求 daemon plist 在
      # bundle 内)。buildPhase.copyFiles destination:wrapper + subpath 落到
      # bundle 根下的子目录(verified xcodegen 2.45.4)。文件名 == Label。
      - path: Support/com.joyzhang.myportrait.SleepHelper.plist
        buildPhase:
          copyFiles:
            destination: wrapper
            subpath: Contents/Library/LaunchDaemons
    dependencies:
      # 图谱物理静态库(Debug 也 -O,见上)。静态链接,无需 embed/签名。
      - target: GraphPhysics
      - package: GRDB
        product: GRDB
      - package: WhisperKit
        product: WhisperKit
      - package: mlx-swift
        product: MLX
      - package: mlx-swift
        product: MLXNN
      - package: mlx-swift
        product: MLXFast
      - package: qwen3-asr-swift
        product: Qwen3ASR
      - package: TOMLKit
        product: TOMLKit
      - package: onnxruntime
        product: onnxruntime
      - sdk: libsqlite3.tbd
      - package: Sparkle
        product: Sparkle
      # 特权 root LaunchDaemon helper —— 嵌进 .app/Contents/MacOS/ 并随 app build
      # 用同一身份(MyPortraitDev)重签(codeSign=CodeSignOnCopy,保证叶证书哈希一致)。
      # ⚠️ embed:true + copy.destination:executables 才落到 Contents/MacOS/
      # (verified xcodegen 2.45.4:embed 单独用会落 Resources/;copy 不配 embed
      # 整个拷贝相位会消失)。BundleProgram 指的就是这里的 Contents/MacOS/PortraitSleepHelper。
      - target: PortraitSleepHelper
        embed: true
        codeSign: true
        copy:
          destination: executables
          subpath: ""
    # DEVELOPMENT_TEAM 通过 xcconfig 注入,不在 settings.base 里硬编。
    # base 里的 build settings 优先级高于 xcconfig,会覆盖掉它,所以这里必须
    # 用 configFiles 而不是 base。Signing.xcconfig 里有默认 team,contributor
    # 通过 #include? Signing.local.xcconfig 覆盖。
    configFiles:
      Debug: Support/Signing.xcconfig
      Release: Support/Signing.xcconfig
    info:
      path: Support/Info.plist
      properties:
        CFBundleDisplayName: My Portrait
        CFBundleName: MyPortrait
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: "15.0"
        NSHighResolutionCapable: true
        NSMicrophoneUsageDescription: My Portrait records microphone audio to build your personal activity timeline.
        # macOS 14+ (Sonoma) 起 Calendar 权限分 write-only / full,我们要读
        # 事件给 LLM 当上下文,得申请 full access。第一次调用
        # EKEventStore.requestFullAccessToEvents 时系统弹这个文案。
        NSCalendarsFullAccessUsageDescription: My Portrait reads your calendar so AI cronJobs and timeline context can reason about your meetings and schedule.
        # 屏幕录制 —— ScreenCaptureKit / CGRequestScreenCaptureAccess 用。
        # 公证审查必查;缺这条 macOS 14+ 拒绝授权。
        NSScreenCaptureUsageDescription: My Portrait captures screen contents to extract text (OCR) for your personal activity timeline. All processing happens on this Mac.
        # 输入监听 —— CGEventTap + IOHIDCheckAccess 用,跟 Accessibility 是
        # 两个独立 TCC 项。公证必查。
        NSInputMonitoringUsageDescription: My Portrait monitors keystrokes to build a private timeline of what you wrote. Keystrokes stay on this Mac.
        # ---------- Sparkle 自动更新 ----------
        # 公开 URL —— GitHub Pages 托管的 appcast。第一次推之前要在
        # GitHub 仓库 Settings → Pages 把 docs/ 当 source。
        SUFeedURL: https://joyzhang14-14.github.io/My-Portrait/appcast.xml
        # EdDSA 公钥(generate_keys 产物的 public key 部分)。私钥进 keychain
        # 不进仓库;sign_update 时 Sparkle 自己从 keychain 取。
        SUPublicEDKey: r40y799hLosIZZpq47T953f24ElEj5ou0BEdPN0lMCM=
        # 跳过用户手动「Check for Updates」对话框,直接弹更新提示。
        SUEnableAutomaticChecks: true
        # **必须显式声明**:Sparkle 内部 `allowsAutomaticUpdates` 默认从
        # automaticallyChecksForUpdates 推导,我们 UpdaterService 把它设
        # false(关 Sparkle 自己的 scheduler 用我们的 Timer 绕开 1h
        # minimum)→ allowsAutomaticUpdates = false → setAutomaticallyDownloads-
        # Updates(true) **静默拒绝**,silent download 永远不发生。
        # 这条 Info.plist key 把推导路径切到 explicit option,即使
        # auto-check 是 false,只要 toggle 用户开了 autoDownloadUpdates 就生效。
        SUAllowsAutomaticUpdates: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joyzhang.myportrait
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "6.0"
        # arm64-only:核心转录/语音功能依赖 MLX(仅 Apple Silicon)。x86_64 既跑不了
        # 这些功能,也编不过(SpeechVAD whole-module 优化 x86_64 交叉编爆内存)。
        # 放弃 Intel 支持。
        ARCHS: arm64
        MARKETING_VERSION: "1.2.168"
        CURRENT_PROJECT_VERSION: "174"
        # **签名相关 build settings 全部走 Support/Signing.xcconfig**
        # —— `settings.base` 在 xcodegen / Xcode 里**优先级高于 xcconfig**,
        # 写在这里会盖掉 contributor 的 Signing.local.xcconfig 覆盖。
        # 默认值(CODE_SIGN_STYLE / DEVELOPMENT_TEAM)都在 Signing.xcconfig
        # 里写,Signing.local.xcconfig 通过 #include? 选择性覆盖。
        #
        # 历史注释曾说"自签名证书 macOS TCC 对 Screen Recording 主动拒绝
        # (auth_value 卡 0)"—— 经 My-Orphies(MyOrphiesDev 自签 cert)实测,
        # **这条不成立**(可能早期 macOS 14.x 有过 bug 已修),Joy 现在
        # 本地 Signing.local.xcconfig 走 MyPortraitDev 自签 cert + Manual
        # 签,跟 release dmg 共享 TCC 权限。
        # DEVELOPMENT_TEAM 由 Support/Signing.xcconfig 提供(默认 VYHNX2Y2AL,
        # contributor 可通过 Signing.local.xcconfig 覆盖)。settings.base 里
        # 显式设值会优先于 xcconfig,所以这里**不要**写回 DEVELOPMENT_TEAM。
        # Hardened runtime + entitlements —— Apple notarize 必须。
        # entitlements 文件 declare 用到的「受保护能力」(mic / camera / Apple
        # events / 动态库加载),hardened runtime 强制只允许声明过的能力。
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_ENTITLEMENTS: Support/MyPortrait.entitlements
        # @testable import 需要 app target 开 testability。
        ENABLE_TESTABILITY: true
        # ObjC bridging header —— 暴露 MyPortraitObjC.h 给 Swift 直接调,
        # 不用 import。Sources/MyPortraitObjC 直接挂在 app target 里。
        SWIFT_OBJC_BRIDGING_HEADER: Sources/MyPortraitObjC/include/MyPortraitObjC.h

  # ── 特权 root LaunchDaemon helper(合盖+插电时 pmset disablesleep 撑长云调用)──
  # macOS 命令行工具(type: tool → product-type.tool)。命令行工具没有
  # Contents/Info.plist,SMAppService/launchd 需要 CFBundleIdentifier 嵌进 Mach-O
  # 的 __TEXT,__info_plist 段 → 靠 CREATE_INFOPLIST_SECTION_IN_BINARY=YES +
  # info: 块(XcodeGen 生成 plist 文件并设 INFOPLIST_FILE)。
  # 跟 app 用同一 Signing.xcconfig(同一身份,SMAppService 信任链才过)。
  PortraitSleepHelper:
    type: tool
    platform: macOS
    sources:
      - Sources/PortraitSleepHelper
    configFiles:
      Debug: Support/Signing.xcconfig
      Release: Support/Signing.xcconfig
    info:
      path: Support/PortraitSleepHelper-Info.plist
      properties:
        CFBundleIdentifier: com.joyzhang.myportrait.SleepHelper
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundlePackageType: APPL
    settings:
      base:
        PRODUCT_NAME: PortraitSleepHelper
        PRODUCT_BUNDLE_IDENTIFIER: com.joyzhang.myportrait.SleepHelper
        SWIFT_VERSION: "6.0"
        ARCHS: arm64
        # SMAppService + 公证都要 helper 开 hardened runtime,跟 app 一致。
        ENABLE_HARDENED_RUNTIME: true
        # 把生成的 Info.plist 烤进 binary 的 __TEXT,__info_plist 段(工具无 bundle)。
        CREATE_INFOPLIST_SECTION_IN_BINARY: "YES"
        # 工具默认 SKIP_INSTALL=YES;显式 NO 让 app 的拷贝相位找得到产物。
        SKIP_INSTALL: "NO"
        # ⚠️ EX_CONFIG(78) 修复 —— root daemon 必须**零 entitlement**,否则自签名
        # (无 Team ID)下 SMAppService 的 LWCR/SpawnConstraint 无法授权,launchd 拒
        # 启动、main() 前就挂。必须**两条都加**(实测少一个无效):
        #   · 空 entitlements 文件 → 去掉 Xcode 按 bundle id 合成的无 team
        #     application-identifier(受限 entitlement,无 profile 不授权)
        CODE_SIGN_ENTITLEMENTS: Support/PortraitSleepHelper.entitlements
        #   · 关掉 Debug 基础注入 → 去掉 get-task-allow(可调试的 root,同样不授权)
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: "NO"

  MyPortraitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/MyPortraitTests
    dependencies:
      - target: MyPortrait
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: "YES"

schemes:
  MyPortrait:
    build:
      targets:
        MyPortrait: all
        MyPortraitTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - MyPortraitTests
